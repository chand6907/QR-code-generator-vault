<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History — QRVault</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="app-body">

<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="logo-icon">⬛</span>
    <span class="logo-text">QRVault</span>
  </div>
  <nav class="sidebar-nav">
    <a th:href="@{/dashboard}" class="nav-item">
      <span class="nav-icon">⊞</span> Dashboard
    </a>
    <a th:href="@{/history}" class="nav-item active">
      <span class="nav-icon">◷</span> History
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="user-avatar" th:text="${#strings.substring(user.fullName, 0, 1)}">J</div>
    <div class="user-info">
      <span class="user-name" th:text="${user.fullName}">Jane Doe</span>
      <span class="user-email" th:text="${user.email}">jane@example.com</span>
    </div>
    <a th:href="@{/auth/logout}" class="logout-btn" title="Sign out">⏻</a>
  </div>
</aside>

<main class="main-content">
  <div class="page-header">
    <div>
      <h1 class="page-title">Your QR History</h1>
      <p class="page-sub">All QR codes generated on your account.</p>
    </div>
    <a th:href="@{/dashboard}" class="btn-back">← Generate new</a>
  </div>

  <!-- Empty state -->
  <div class="empty-state" th:if="${#lists.isEmpty(history)}">
    <p>No QR codes yet. <a th:href="@{/dashboard}">Generate your first one →</a></p>
  </div>

  <!-- History table -->
  <div class="table-card" th:if="${not #lists.isEmpty(history)}">
    <table class="history-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Type</th>
          <th>Data / Content</th>
          <th>Generated at</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="item, stat : ${history}">
          <td class="row-num" th:text="${stat.count}">1</td>
          <td><span class="badge" th:text="${item.qrType}">URL</span></td>
          <td class="data-cell" th:text="${#strings.abbreviate(item.inputData, 80)}">https://…</td>
          <td class="time-cell" th:text="${#temporals.format(item.createdAt, 'dd MMM yyyy, HH:mm')}">01 Jan 2024</td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

</body>
</html>
