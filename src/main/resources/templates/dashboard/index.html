<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Dashboard — QRVault</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="app-body">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="logo-icon">⬛</span>
    <span class="logo-text">QRVault</span>
  </div>
  <nav class="sidebar-nav">
    <a th:href="@{/dashboard}" class="nav-item active">
      <span class="nav-icon">⊞</span> Dashboard
    </a>
    <a th:href="@{/history}" class="nav-item">
      <span class="nav-icon">◷</span> History
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="user-avatar" th:text="${#strings.substring(user.fullName, 0, 1)}">J</div>
    <div class="user-info">
      <span class="user-name" th:text="${user.fullName}">Jane Doe</span>
      <span class="user-email" th:text="${user.email}">jane@example.com</span>
    </div>
    <a th:href="@{/auth/logout}" class="logout-btn" title="Sign out">⏻</a>
  </div>
</aside>

<!-- Main content -->
<main class="main-content">

  <div class="page-header">
    <div>
      <h1 class="page-title">QR Generator</h1>
      <p class="page-sub">Choose a type, fill in the details, and generate.</p>
    </div>
    <div class="header-stat">
      <span class="stat-big" th:text="${totalQRs}">0</span>
      <span class="stat-label">codes generated</span>
    </div>
  </div>

  <div class="workspace">
    <!-- ── Generator form ─────────────────────────────────────────── -->
    <div class="generator-card">

      <!-- Type tabs -->
      <div class="type-tabs">
        <button class="type-tab active" data-type="URL"     onclick="switchType('URL',this)">🔗 URL</button>
        <button class="type-tab"        data-type="TEXT"    onclick="switchType('TEXT',this)">📝 Text</button>
        <button class="type-tab"        data-type="WIFI"    onclick="switchType('WIFI',this)">📶 Wi-Fi</button>
        <button class="type-tab"        data-type="CONTACT" onclick="switchType('CONTACT',this)">👤 Contact</button>
      </div>

      <!-- URL Panel -->
      <div id="panel-URL" class="type-panel active">
        <div class="field">
          <label>Website URL</label>
          <input type="url" id="urlData" placeholder="https://your-website.com"/>
        </div>
      </div>

      <!-- Text Panel -->
      <div id="panel-TEXT" class="type-panel">
        <div class="field">
          <label>Your message or text</label>
          <textarea id="textData" rows="4" placeholder="Enter any text, a message, coupon code, or note…"></textarea>
        </div>
      </div>

      <!-- Wi-Fi Panel -->
      <div id="panel-WIFI" class="type-panel">
        <div class="field">
          <label>Network name (SSID)</label>
          <input type="text" id="wifiSsid" placeholder="MyHomeWiFi"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="text" id="wifiPassword" placeholder="Enter Wi-Fi password"/>
        </div>
        <div class="field">
          <label>Security type</label>
          <select id="wifiSecurity">
            <option value="WPA">WPA / WPA2</option>
            <option value="WEP">WEP</option>
            <option value="">None (open network)</option>
          </select>
        </div>
      </div>

      <!-- Contact Panel -->
      <div id="panel-CONTACT" class="type-panel">
        <div class="field-row">
          <div class="field">
            <label>First name</label>
            <input type="text" id="contactFirst" placeholder="Jane"/>
          </div>
          <div class="field">
            <label>Last name</label>
            <input type="text" id="contactLast" placeholder="Doe"/>
          </div>
        </div>
        <div class="field">
          <label>Phone number</label>
          <input type="tel" id="contactPhone" placeholder="+91 98765 43210"/>
        </div>
        <div class="field">
          <label>Email address</label>
          <input type="email" id="contactEmail" placeholder="jane@example.com"/>
        </div>
      </div>

      <!-- Options -->
      <div class="options-grid">
        <div class="field">
          <label>Error correction</label>
          <select id="ecLevel">
            <option value="L">Low — 7%</option>
            <option value="M" selected>Medium — 15%</option>
            <option value="Q">High — 25%</option>
            <option value="H">Max — 30%</option>
          </select>
        </div>
        <div class="field">
          <label>Output size</label>
          <select id="qrSize">
            <option value="150">Small (150 px)</option>
            <option value="250" selected>Medium (250 px)</option>
            <option value="400">Large (400 px)</option>
          </select>
        </div>
        <div class="field">
          <label>Foreground color</label>
          <div class="color-field">
            <input type="color" id="fgColor" value="#000000"/>
            <span id="fgHex">#000000</span>
          </div>
        </div>
        <div class="field">
          <label>Background color</label>
          <div class="color-field">
            <input type="color" id="bgColor" value="#ffffff"/>
            <span id="bgHex">#ffffff</span>
          </div>
        </div>
      </div>

      <button class="btn-generate" onclick="generateQR()" id="generateBtn">
        <span id="btnText">Generate QR Code</span>
        <span id="btnLoader" class="loader" style="display:none"></span>
      </button>
    </div>

    <!-- ── QR output ───────────────────────────────────────────────── -->
    <div class="output-card" id="outputCard">
      <div class="output-empty" id="outputEmpty">
        <div class="empty-qr-preview">
          <div class="qr-placeholder-grid"></div>
        </div>
        <p>Your QR code will appear here</p>
      </div>
      <div class="output-result" id="outputResult" style="display:none">
        <img id="qrImage" alt="Generated QR Code"/>
        <div class="output-meta" id="outputMeta"></div>
        <div class="output-actions">
          <button class="btn-download" onclick="downloadQR()">⬇ Download PNG</button>
          <button class="btn-copy"     onclick="copyQR()">⎘ Copy image</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent history -->
  <div class="recent-section" th:if="${not #lists.isEmpty(history)}">
    <div class="section-header">
      <h2>Recent generations</h2>
      <a th:href="@{/history}" class="see-all">See all →</a>
    </div>
    <div class="history-grid">
      <div class="history-card" th:each="item : ${history}">
        <span class="history-badge" th:text="${item.qrType}">URL</span>
        <span class="history-data" th:text="${#strings.abbreviate(item.inputData, 60)}">https://…</span>
        <span class="history-time" th:text="${#temporals.format(item.createdAt, 'dd MMM, HH:mm')}">01 Jan, 12:00</span>
      </div>
    </div>
  </div>

</main>

<!-- Download helper form (hidden) -->
<form id="downloadForm" th:action="@{/download}" method="post" style="display:none">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <input type="hidden" id="downloadData" name="base64Image"/>
</form>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
